services:
  navidrome:
    image: deluan/navidrome:latest
    # user: 1000:1000 # should be owner of volumes
    ports:
      - "4533:4533"
    restart: unless-stopped
    volumes:
      - default_data:/data
      - default_music:/music:ro

volumes:
  default_data:
    external: true
  default_music:
    external: true

